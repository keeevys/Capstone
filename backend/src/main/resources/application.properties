spring.application.name=backend
spring.datasource.url=${DB_URL:jdbc:h2:file:~/AppData/Local/Phonexis/phonexis;MODE=MySQL;DATABASE_TO_UPPER=false;AUTO_SERVER=TRUE}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
server.error.include-message=always
